<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
        <title>City Skyline Contact</title>

        <style>
            body{
                margin:0;
                font-family:'Poppins',sans-serif;
                background:linear-gradient(rgba(11,29,47,0.9),rgba(11,29,47,0.95));
                background-size:cover;
                background-position:center;
                background-attachment:fixed;
            }

            /* header */
            header{
                text-align:center;
                padding:40px 20px;
            }

            .heading{
                font-size:55px;
                font-weight:700;
                color:white;
                text-transform:uppercase;
                letter-spacing:2px;
                text-shadow:
                0 0 10px #000,
                0 0 20px #071a54;
            }

            /* main container */
            .contact-container{
                width:70%;
                margin:auto;
                padding:40px;
                background:rgba(162, 165, 162, 0.05);
                backdrop-filter:blur(10px);
                border-radius:20px;
                box-shadow:0 10px 40px rgba(0,0,0,0.6);
            }

            /* contact info */
            .contact-info{
                text-align:center;
                color:#e8f0ff;
                font-size:20px;
                line-height:2;
            }

            .contact-info b{
                color:#ffd27a;
            }

            
            /* SOCIAL */

            .social{
            text-align:center;
            margin-top:25px;
            }

            .social a{

            text-decoration:none;
            margin:0 10px;
            font-size:25px;

            color:#ffd27a;
            }

            /* RESPONSIVE */

            @media(max-width:900px){

            .contact-container{
            width:90%;
            }

            .heading{
            font-size:40px;
            }

            }

        </style>
    </head>
    <body>

        <header>
            <h1 class="heading">📞 Contact City Skyline</h1>
        </header>

        <div class="contact-container">
            <div class="contact-info">
                <p>We would love to hear from you! If you have any questions, suggestions, or need help with booking, feel free to contact us.</p>
                <p><b>📍 Address:</b> 123 Skyline Street, Travel City, India</p>
                <p><b>📞 Phone:</b> +91 89790 35309</p>
                <p><b>📧 Email:</b> support@cityskyline.com</p>
            </div>
        
            <div class="social">
                <a href="#">🌐</a>
                <a href="#">📘</a>
                <a href="#">📸</a>
                <a href="#">🐦</a>
            </div>

        </div>

</body>
</html>
